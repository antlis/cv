  - type: text
    title: "Overview"
    body: |
      WikiNest is a git-native wiki built for small engineering teams who want collaborative documentation without infrastructure overhead.

      The core idea is deliberately minimal: a wiki is nothing more than a collection of markdown files in a Git repository. WikiNest acts as a thin browser-based editing layer over that repository — every page you write, every edit you save becomes a Git commit automatically.

      No server to spin up. No database to provision. No npm install, no build pipeline, no Docker container. The entire application ships as a single `index.html` and one `style.css` file.

      Setup takes two minutes: fork the repository, enable GitHub Pages or GitLab Pages, done. Your team gets a collaborative wiki backed by version control from day one.

  - type: divider

  - type: text
    title: "Problem"
    body: |
      Documentation tooling for small teams has a frustrating cost structure.

      The established options each come with significant baggage:

      - **Confluence** — per-user SaaS pricing that punishes growth, opaque versioning, vendor lock-in
      - **Wiki.js** — requires Node.js server, PostgreSQL or MongoDB, ongoing infrastructure maintenance
      - **Docusaurus / MkDocs** — need a Node.js or Python build pipeline, local environment setup, CI for deployment
      - **Notion** — closed platform, no real version history, export is a one-way door

      For a team of 2–8 engineers who just want to write docs and track decisions, none of these is proportionate to the actual need.

      The underlying insight: if you already use Git, you already have all the infrastructure you need for a wiki. The files just need a decent editor in front of them.

  - type: divider

  - type: text
    title: "Solution"
    body: |
      WikiNest strips the problem down to its minimum viable form.

      The application talks directly to the GitHub or GitLab API from the browser. There is no backend — authentication happens via a personal access token stored in localStorage. Reading and writing pages means making API calls to read file contents and commit changes.

      This architecture has a clean consequence: every edit is automatically versioned. Roll back any page to any prior state. See exactly who changed what and when. The wiki's history is the repository's commit history — no separate audit log, no proprietary revision system.

      The tradeoff is intentional: WikiNest optimises for zero infrastructure cost and zero maintenance burden over rich real-time collaboration features.

  - type: divider

  - type: text
    title: "What I built"
    bullets:
      - Split-view markdown editor — raw markdown on the left, live rendered preview on the right
      - Auto-versioning — every save generates a Git commit with a descriptive message
      - Offline drafts — autosave to localStorage every 500ms, changes survive page reloads
      - Drag-and-drop image uploads — images are committed directly into the repository as binary blobs
      - Wiki-style linking — "[[Page Name]]" syntax with autocomplete across existing pages
      - Full-text search — index generated by CI on every push, searched client-side
      - Page history — last 20 commits per page with diff preview
      - Folder management — create and rename folders with custom naming
      - GitHub Pages and GitLab Pages deployment — no separate hosting required
      - Zero external runtime dependencies — no npm, no bundler, no CDN scripts

  - type: divider

  - type: text
    title: "Architecture"
    body: |
      The application is structurally flat: one HTML file, one CSS file, vanilla JavaScript with no framework.

      All state lives in two places:
      - The Git repository — canonical, versioned source of truth for all page content
      - localStorage — temporary session state (auth token, offline drafts, UI preferences)

      Read path:
      The browser calls the GitHub/GitLab REST API to fetch file contents. Markdown is parsed and rendered client-side. No server touch.

      Write path:
      On save, the application computes the base64 encoding of the updated file and calls the API's update-file endpoint with the current file SHA. The API atomically commits the new version. Conflict detection is handled by the SHA — if the file changed since last read, the commit fails with a clear error.

      Search path:
      A GitHub Actions workflow runs on every push and generates a flat JSON index of all page content. The browser fetches this index once per session and runs full-text search locally.

      This separation means the editor has no operational cost beyond the API rate limits of a standard GitHub free account — well within the range for any team writing documentation.

  - type: divider

  - type: text
    title: "Engineering Decisions"
    bullets:
      - No framework — vanilla JS keeps the bundle size at zero and eliminates dependency drift entirely
      - API-first writes — using Git provider APIs means versioning is structural, not bolted on
      - localStorage for auth — avoids any server-side session management; the token never leaves the browser
      - CI-generated search index — avoids client-side indexing on load while keeping search instant
      - Single file distribution — the entire app can be forked and served from any static host in minutes
      - localStorage autosave — 500ms interval prevents data loss without requiring a backend persistence layer

  - type: divider

  - type: text
    title: "Trade-offs"
    bullets:
      - No real-time collaboration — concurrent edits require manual conflict resolution via Git
      - Personal access token auth — not suitable for large organizations requiring SSO or role-based access
      - Search index has ~1 commit lag — content is searchable after the next CI run, not immediately on save
      - GitHub/GitLab API rate limits apply — unlikely to be an issue for small teams, but worth noting
      - No rich text editor — markdown only, intentional trade-off for simplicity and portability

  - type: divider

  - type: text
    title: "Result"
    bullets:
      - Full wiki system with zero backend infrastructure
      - Every edit is a traceable, reversible Git commit
      - "Setup time: under 2 minutes from fork to live wiki"
      - Works on any static hosting provider that supports GitHub/GitLab Pages
      - Total codebase: ~1000 lines of vanilla HTML/CSS/JS
      - MIT licensed, fork-ready template repository

  - type: divider

  - type: text
    title: "Takeaways"
    body: |
      WikiNest is a study in constraint as design tool.

      By refusing to add a server, a database, or a build step, every other decision followed naturally: use the Git provider API directly, store state in localStorage, generate the search index in CI, distribute as a single file.

      The result is a tool that is genuinely usable from day one, costs nothing to run, and is fully transparent — you can read every line of the application in an afternoon. For small engineering teams, that transparency and zero operational overhead is often more valuable than the feature richness of heavier alternatives.

      It also demonstrates a pattern worth generalising: many tools that assume they need a backend actually don't, if you're willing to accept the right tradeoffs and build against the APIs your users are already using.
