  - type: text
    title: "Multiplayer"
    body: |
      Movement this precise is brutal to synchronise — a few milliseconds of desync turns a clean run into teleporting.

      The netcode runs on Unity + Photon: a master server handles connection and matchmaking, a host spins up a session for up to eight players, and everyone runs on a shared tick. Remote players are interpolated (lerped) between authoritative updates, which keeps movement smooth on every screen instead of stuttering with the network.

  - type: divider

  - type: text
    title: "Cosmetics & economy"
    body: |
      Progression is cosmetic — skins, pulled from crates on honest random odds (the base loadout, a pair of gloves and a knife, drops as two separate items). I modelled and textured the skins myself in Marmoset and Maya, painting directly onto the finished models to get the textures sitting right.

      BP — the in-game points — open crates, and you earn it by playing: clearing maps against the clock, taking part online, or buying it outright via in-app purchases.

  - type: text
    title: "Monetization & growth"
    body: |
      The money model was ads plus IAP, and the split is the interesting part: **rewarded ads were the engine** — the bulk of the $160K+ — while in-app purchases were only about 5% of total revenue.

      Launch marketing was lean: roughly $1.5K spent on targeted ads across niche subreddits, Google and Facebook. The bhop community and store discovery did the rest. The Google Play trailer was deliberately unfancy too — about ninety seconds of raw gameplay with a Celldweller track laid over the top.

  - type: divider

  - type: text
    title: "War stories"
    bullets:
      - "Sitting at 3 a.m. on Skype talking an American CSGO mapmaker into letting his map into the game."
      - "Hand-fighting Marmoset and Maya to make custom skins sit right — painting straight onto the finished model."
      - "Three weeks after launch, getting served a YouTube recommendation for a review of my own game by some random kid — the algorithm pitching me back the thing I'd just shipped."

  - type: divider

  - type: text
    title: "Outcome"
    body: |
      After the revenue split and three months of support, the game was handed over to the client. There was apparently some drama afterward that I wasn't part of, and I can't vouch for what the project became — plenty of people said it went downhill once it changed hands.

      What I keep from it is the engineering: a genuinely hard PC movement mechanic, ported faithfully enough to feel real on a phone, on a roster of hand-rebuilt maps — and a product that found an audience and made money on the strength of that faithfulness.

  - type: divider

  - type: text
    title: "Takeaways"
    body: |
      Bhop Jump worked because it refused the easy version. The whole bet was that the niche, demanding feel of real bunny-hopping was worth porting exactly — not approximating — and that an audience would pay for the genuine article on a platform that had never had it.

      The hard parts were unglamorous: matching engine physics down to the units, and rebuilding every map by hand. But that fidelity was the product. It's a reminder that for skill-based mechanics, "close enough" isn't — the feel is the feature.
