  - type: text
    title: "Обзор"
    body: |
      Bhop Jump — соревновательная мобильная игра вокруг bunny-hopping: скилловой механики движения из движка Source, где точный тайминг прыжков и эйр-стрейф позволяют разгоняться и нести скорость через карту.

      Это был заказ. Клиент пришёл с одним чётким требованием — принести настоящий bhop на телефоны. На тот момент этого не сделал никто: была единственная ранняя попытка, и она была кривой. Задача была не «сделать раннер», а заставить саму механику ощущаться достоверно на тач-экране.

      Игра вышла на iOS и Android в 2017 и принесла **$160K+ только за Q1** — почти целиком на rewarded-рекламе — при примерно 100K загрузок.

  - type: divider

  - type: text
    title: "Бриф — и спрятанный дракон"
    body: |
      Игра делалась под DragonGameStudios (отсюда bundle id `com.dgs.bhop`). Клиент хотел её на своём аккаунте и доплатил 50% сверху за white-label — никакого логотипа студии, никаких упоминаний DragonGameStudios нигде.

      На одно он согласился: кастомный задник меню. И этот задник — скриншот из CS, в дверь которого тихо вписан дракон студии. Клиент заплатил, чтобы стереть студию, а дракон так и сидит в этой двери до сих пор.

      Логотип опирается на тот же исходник: контртеррорист в прыжке с ножом, вырезанный руками из скриншота Counter-Strike 1.6, положенный на одну заливку и — после подбора палитры в Figma — сделанный белым по тёмно-серому, потому что так лучше всего читался как иконка на iOS.

  - type: divider

  - type: text
    title: "Что вообще такое bunny-hopping"
    body: |
      В играх на Source ты не просто бежишь — ты прыгаешь раз за разом и рулишь в воздухе. Поймай тайминг приземления-в-прыжок и стрейфь в такт с камерой — и ты набираешь скорость, а не теряешь её. Сделано хорошо — летишь по карте куда быстрее бега; плохо — глохнешь.

      В этом весь кайф: высокий скилл-силок за простым вводом. Механика награждает консистентность, а не реакцию. Перенести это на мобилку — не упростив до очередного авто-раннера — и было всем проектом.

  - type: text
    title: "Порт движения Source в Unity"
    body: |
      Bhop нельзя сымитировать. Если кривые ускорения, трение, air-control и тайминговые окна не совпадают с тем, что ждёт мышечная память игрока, — это мгновенно ощущается неправильно.

      Поэтому движение было не «вдохновлено» Source, а портировано из него. Я вытащил реальные метрики движка, размеры персонажа и поведение, перевёл юниты Source в юниты Unity и фактически переписал эту физику в Unity — чтобы ускорение и эйр-стрейф вели себя как настоящие. Добиться достоверности чисел и тайминговых окон было самой сложной отдельной инженерной задачей в игре.

  - type: text
    title: "Мобильное управление — одна уступка"
    body: |
      Тач-схема намеренно минимальна. Единственная реальная поблажка под мобилку — **автопрыжок**: игра прыгает за тебя, чтобы пальцы были свободны для того, что важно. Дальше — левый и правый края экрана это твои повороты, и всё.

      Всё сложное остаётся сложным. Скилл-гэп не в управлении, а в **консистентности движения**: держать линию, попадать в тайминг, нести скорость круг за кругом.

  - type: divider

  - type: image
    title: "Три режима"
    src: /media/projects/bhop-jump/menu.jpg
    alt: "Меню выбора режима — Bhop Classic, Bhop Speed, Multiplayer, валюта BP"
    body: |
      Игра делится на три режима, оплачиваемых в BP (внутриигровые очки). **Bhop Classic** — ядро: достоверный bhop на портированных картах сообщества. **Bhop Speed** — его стилизованный двойник, неоновый вайрфрейм-тоннель, сведённый к чистой скорости и таймингу. **Multiplayer** — те самые сессии до восьми игроков, о которых ниже.

  - type: divider

  - type: text
    title: "Карты: классика сообщества, пересобранная вручную"
    body: |
      Карты — это именитые bhop-карты сообщества, которые игроки уже знали. Их использование означало разыскивать авторов ради разрешения, и это была отдельная сага: многие так и не ответили, поэтому в игре прямо в мире висит DMCA-плашка с контактами — на случай, если кто-то из создателей будет против.

      Занос каждой карты был ручной, муторной работой. Карты вытаскивались как сырые модели и текстуры, а потом пересобирались в Unity вручную — меши, материалы переработаны под рендер Unity, освещение расставлено на глаз, триггеры и зоны старта/финиша прописаны под каждую карту. Умножь это на полный ростер, разбитый на субъективные тиры сложности. Это была самая времязатратная часть всего проекта.

