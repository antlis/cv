  - type: divider

  - type: text
    title: "Мультиплеер"
    body: |
      Такое точное движение зверски сложно синхронизировать — пара миллисекунд рассинхрона превращает чистый ран в телепорт.

      Неткод на Unity + Photon: мастер-сервер отвечает за подключение и матчмейкинг, хост поднимает сессию до восьми игроков, и все идут по общему тику. Удалённые игроки интерполируются (лерпинг) между авторитетными апдейтами — это держит движение плавным на каждом экране, вместо рывков в такт сети.

  - type: divider

  - type: text
    title: "Косметика и экономика"
    body: |
      Прогрессия косметическая — скины, выпадающие из ящиков по честному рандому (базовый набор, перчатки и нож, падает как два отдельных предмета). Скины я моделил и текстурил сам в Marmoset и Maya, рисуя прямо по готовой модели, чтобы текстуры легли правильно.

      BP — внутриигровые очки — открывают ящики, и зарабатываешь их игрой: прохождением карт на время, участием в онлайне — или покупаешь напрямую через внутриигровые покупки.

  - type: text
    title: "Монетизация и рост"
    body: |
      Модель денег — реклама плюс IAP, и интересен именно сплит: **rewarded-реклама была движком** — основная масса из $160K+ — а внутриигровые покупки давали лишь около 5% от общей выручки.

      Маркетинг на запуске был скромный: примерно $1.5K на таргетированную рекламу по нишевым сабреддитам, Google и Facebook. Остальное сделали комьюнити bhop и выдача сторов. Трейлер в Google Play тоже был нарочно простым — около полутора минут сырого геймплея с наложенным треком Celldweller.

  - type: divider

  - type: text
    title: "Истории из окопов"
    bullets:
      - "Сидеть в 3 ночи в скайпе и уговаривать американца-мапмейкера из CSGO пустить его карту в игру."
      - "Воевать руками с Marmoset и Maya, чтобы кастомные скины легли правильно — рисуя прямо по готовой модели."
      - "Через три недели после релиза получить от ютуба рекомендацию обзора собственной игры от какого-то школьника — алгоритм подсунул мне то, что я только что выпустил."

  - type: divider

  - type: text
    title: "Итог"
    body: |
      После дележа выручки и трёх месяцев саппорта игра была передана клиенту. Дальше, судя по всему, был какой-то скандал, в котором я уже не участвовал, и за то, чем стал проект, я ручаться не могу — многие говорили, что после смены рук игра скатилась.

      Что я забираю из этого — инженерию: по-настоящему сложную PC-механику движения, портированную достаточно достоверно, чтобы ощущаться настоящей на телефоне, на ростере вручную пересобранных карт — и продукт, который нашёл аудиторию и заработал именно на этой достоверности.

  - type: divider

  - type: text
    title: "Выводы"
    body: |
      Bhop Jump сработал, потому что отказался от лёгкой версии. Вся ставка была в том, что нишевое, требовательное ощущение настоящего bunny-hopping стоит портировать точно — а не приблизительно — и что аудитория заплатит за оригинал на платформе, где его никогда не было.

      Сложное было неэффектным: совпасть с физикой движка вплоть до юнитов и пересобрать каждую карту руками. Но именно эта точность и была продуктом. Это напоминание: для скилловых механик «достаточно близко» — не близко; ощущение и есть фича.
