name: Deploy CV Hub to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright cache
        id: playwright-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      # Skip entirely on a cache hit. On a miss, install system deps once, then
      # retry the browser download — cdn.playwright.dev intermittently stalls a
      # connection with no progress and no timeout, hanging the whole job.
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          npx playwright install-deps chromium
          for i in 1 2 3; do
            if timeout 180 npx playwright install chromium; then
              exit 0
            fi
            echo "::warning::Playwright browser download stalled (attempt $i/3), retrying in 5s"
            sleep 5
          done
          echo "::error::Playwright install failed after 3 attempts"
          exit 1

      # Save only on a miss AND a successful install, so a partial/stalled
      # download is never cached (which would poison every later run).
      - name: Save Playwright cache
        if: steps.playwright-cache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Build Astro site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify_telegram:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Notify Telegram
        env:
          BOT_TOKEN:     ${{ secrets.PIPLINE_BOT_SECRET }}
          CHAT_ID:       ${{ secrets.CHAT_ID }}
          BUILD_STATUS:  ${{ needs.build.result }}
          DEPLOY_STATUS: ${{ needs.deploy.result }}
          ACTOR:         ${{ github.actor }}
          BRANCH:        ${{ github.ref_name }}
          SHA:           ${{ github.sha }}
          OWNER:         ${{ github.repository_owner }}
          REPO_NAME:     ${{ github.event.repository.name }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "No telegram secrets, skipping notification"
            exit 0
          fi

          SHORT_SHA="${SHA:0:7}"

          if [ "$BUILD_STATUS" = "success" ] && [ "$DEPLOY_STATUS" = "success" ]; then
            TEXT="@${ACTOR}%0A✅ Deployed successfully!%0ABranch: ${BRANCH}%0ACommit: ${SHORT_SHA}%0A🌐 https://${OWNER}.github.io/${REPO_NAME}/"
          elif [ "$BUILD_STATUS" != "success" ]; then
            TEXT="@${ACTOR}%0A❌ Build failed!%0ABranch: ${BRANCH}%0ACommit: ${SHORT_SHA}"
          else
            TEXT="@${ACTOR}%0A❌ Deploy failed!%0ABranch: ${BRANCH}%0ACommit: ${SHORT_SHA}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="$TEXT"