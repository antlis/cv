# actual types of elements: fixed, added, changed, removed

changelog:
  - version: "1.5.4"
    date: "2026-06-12"
    changes:
      - type: added
        text: "Click-to-zoom lightbox for case-study images — clicking any Deep Dive image opens it fullscreen; close via backdrop click, close button or Escape"
      - type: added
        text: "SEO: sitemap.xml (via @astrojs/sitemap, covers all profile × language routes) and robots.txt pointing to it"
      - type: added
        text: "merge.mjs validates the profile slug === spec invariant and fails fast with a clear message, preventing silent desync between a profile's URL and its CV/download files"
      - type: changed
        text: "Tags de-emphasized — removed borders and muted text on Platforms/Stack/Tags pills so the identical-looking groups stop competing for attention and section hierarchy reads clearer"
      - type: changed
        text: "CI: Telegram notification now passes secrets and context through an env block instead of inline ${{ }} interpolation in the shell script"
      - type: changed
        text: "CI: GitHub Actions runner upgraded to Node 24"
      - type: fixed
        text: "AnimatedBackground performance — reduced orb blur (80px → 60px), slowed drift cycles to 16–22s and removed scale() from keyframes so the blurred layer is cached instead of re-rasterized every frame; cuts desktop scroll/idle jank"
      - type: fixed
        text: "Showcase LCP — first card with an actual image cover now loads eager with fetchpriority=high; remaining covers stay lazy"
      - type: fixed
        text: "i18n: showcase card labels (Platforms/Stack/Tags/Featured) on non-default-language lists no longer fall back to English literals — a stray [lang] index on an already-resolved string was dropping the real translations; now correctly localized and ready for additional languages"
      - type: fixed
        text: "Role dropdown accessibility — added aria-haspopup, aria-controls and aria-expanded synced with open state; removed a stray always-true active class on the trigger"
      - type: fixed
        text: "Removed hover-lift from passive cards (Experience and others) — the global .card:hover translate/shadow was a false affordance on non-clickable cards; hover now stays only on interactive showcase project cards"
      - type: fixed
        text: "Build robustness: home page now guards a missing merged CV artifact with a fallback instead of crashing the build (matches the dynamic profile route)"
      - type: removed
        text: "Dead code in the dynamic showcase route — unused featured/regular/archived split, leftover CSS classes and a stray ... token in the card markup"
  - version: "1.5.3"
    date: "2026-04-26"
    changes:
      - type: added
        text: "PlayStationWaves component — XMB-inspired filled sine-wave canvas background with configurable props, time-of-day hue shift and non-deterministic start position"
      - type: added
        text: "WaveLines component — XMB-style glowing stroke wave lines canvas background with symmetric line layout and offscreen glow compositing"
      - type: added
        text: "GitHub Actions Telegram notification — deploy.yml notifies a Telegram bot on deploy success or failure via PIPLINE_BOT_SECRET and CHAT_ID secrets; gracefully skips if secrets are not configured"
      - type: changed
        text: "Telegram notification now covers build failures — notify_telegram uses needs: [build, deploy] with if: always() so a failed build job also triggers a notification"
      - type: changed
        text: "Telegram notification message extended with branch name and short commit SHA"
      - type: changed
        text: "CI: Playwright Chromium now cached by package-lock.json hash — saves ~2 min per deploy on cache hit"
      - type: added
        text: "LICENSE — MIT license added to repository"
      - type: added
        text: "ARCHITECTURE.md — root-level architecture overview: stack, data pipeline, routing, theming, background components, CI/CD, trade-offs"
      - type: added
        text: "CHANGELOG.md — root-level changelog in Keep a Changelog format covering full version history"
      - type: fixed
        text: "WaveLines glow compositing bug — destination-in mask was applied to full canvas each iteration, destroying background alpha at edges; fixed via per-line offscreen canvas"
      - type: fixed
        text: "Sticky header now works unconditionally — body height: 100% constrained scroll to html element; changed to min-height: 100%"
      - type: fixed
        text: "Role dropdown — replaced CSS :hover toggle with JS click-toggle and click-outside to close; menu no longer closes on accidental cursor exit; added smooth opacity/transform transition"
      - type: fixed
        text: "Scroll jank — body background-attachment: fixed replaced with a fixed pseudo-element layer; gradients no longer repaint on every scroll frame"
      - type: fixed
        text: "Removed mix-blend-mode: overlay from the scanline noise layer — eliminated a fullscreen compositing pass per frame with no visible difference at 0.06 opacity"
  - version: "1.5.2"
    date: "2026-04-05"
    changes:
      - type: fixed
        text: "Mobile pages performance — removed unnecessary CSS rules"
      - type: fixed
        text: "Language switcher on showcase pages now correctly switches between project translations"
      - type: added
        text: "Share button for case study pages (shareable: true in YAML, added to example_cs)"
      - type: changed
        text: "ProjectCard translation props — simplified from object-based to direct strings"
