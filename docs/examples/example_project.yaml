# CV Hub — Showcase project entry example
#
# Добавляется в src/content/showcase/projects_{lang}.yaml
# в массив projects:

- slug: my-project          # имя папки в public/media/projects/
                            # также используется для роутинга кейс стади: /showcase/my-project
  name: "My Project"
  order: 1                  # порядок в списке, меньше = выше
  role: "Lead Developer"
  year: "2024"
  description: "Короткое описание для карточки в списке."
  platforms: [iOS, Android]
  stack: [Unity, C#]
  tags: [Multiplayer, Mobile]
  theme: blue               # blue | cyan | emerald | magenta
  featured: true            # показывает значок пина
  archived: false           # делает карточку свёрнутой с раскрытием по клику
  metrics:
    - label: Revenue
      value: "$100K+"
    - label: Players
      value: "50K+"
    - label: Metric
      value: "Value"
  media:
    - type: image
      src: /media/projects/my-project/cover.png
      alt: "My Project cover"
      featured: true        # эта картинка показывается в карточке
  links:
    - label: App Store
      url: https://apps.apple.com/...
      type: store
    - label: GitHub
      url: https://github.com/...
      type: repo
    - label: Case Study     # ссылка на страницу кейс стади (без /cv_hub/)
      url: /showcase/my-project
      type: product